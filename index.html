<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مشرف هواية</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@600;700;800&family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --blue:#2F6FBF;
    --indigo:#352868;
    --violet:#7C5BA6;
    --pink:#F178A8;
    --sun:#FFC83C;
    --bg:#F6F4FB;
    --card:#FFFFFF;
    --text:#2B2640;
    --text-muted:#79738F;
    --error:#D1485B;
    --radius:22px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 88% -6%, rgba(255,200,60,.22), transparent 38%),
      radial-gradient(circle at -10% 102%, rgba(124,91,166,.16), transparent 42%),
      var(--bg);
    font-family:'Almarai', sans-serif;
    color:var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px 16px;
  }
  .page{width:100%;max-width:440px;}
  .card{
    background:var(--card);
    border-radius:var(--radius);
    padding:30px 26px 34px;
    box-shadow:0 18px 50px -12px rgba(53,40,104,.22);
    position:relative;
    overflow:hidden;
  }
  .welcome-pill{
    display:block;width:fit-content;margin:0 auto 16px;
    padding:7px 18px;border-radius:999px;
    background:linear-gradient(95deg, var(--pink), var(--violet));
    color:#fff;font-family:'Baloo Bhaijaan 2', sans-serif;font-weight:700;font-size:.82rem;
  }
  .btn-secondary{background:#F3F0FA;color:var(--indigo);box-shadow:none;margin-top:10px;}
  h1{font-family:'Baloo Bhaijaan 2', sans-serif;font-weight:700;font-size:1.5rem;color:var(--indigo);text-align:center;margin:0 0 6px;}
  .subtitle{text-align:center;color:var(--text-muted);font-size:.92rem;margin:0 0 24px;}
  label{display:block;font-size:.88rem;font-weight:700;color:var(--indigo);margin-bottom:16px;}
  input, select{
    width:100%;margin-top:8px;padding:13px 14px;border-radius:14px;
    border:2px solid #E7E2F2;background:#FBFAFD;
    font-family:'Almarai', sans-serif;font-size:1rem;color:var(--text);
    outline:none;transition:border-color .15s ease;appearance:none;
  }
  input:focus, select:focus{border-color:var(--blue);}
  select{direction:rtl;}
  button{
    width:100%;padding:15px;border:none;border-radius:999px;
    font-family:'Baloo Bhaijaan 2', sans-serif;font-weight:700;font-size:1.05rem;
    color:#fff;cursor:pointer;
    background:linear-gradient(95deg, var(--blue), var(--violet));
    box-shadow:0 10px 24px -8px rgba(47,111,191,.55);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  button:active{transform:translateY(1px) scale(.99);}
  button:disabled{opacity:.65;cursor:not-allowed;}
  .error{color:var(--error);font-size:.85rem;text-align:center;min-height:1.2em;margin:14px 0 0;font-weight:700;}
  .hidden{display:none;}
  .logo{display:block;width:100%;max-width:200px;margin:0 auto 18px;}
  .image-preview{display:block;width:96px;height:96px;object-fit:cover;border-radius:16px;margin:10px auto 0;border:2px solid #E7E2F2;}
  .sun-icon{font-size:2.1rem;text-align:center;margin-bottom:4px;animation:pop .5s ease;}
  @keyframes pop{0%{transform:scale(0) rotate(-15deg);opacity:0;}65%{transform:scale(1.15) rotate(6deg);opacity:1;}100%{transform:scale(1) rotate(0);}}
  #successName{font-weight:700;color:var(--text);}

  /* بطاقة الطالب بشكل بطاقة هوية/بنكية: يمين = شعار + معلومات، يسار = صورة + باركود */
  .id-card{
    position:relative;margin:18px 0 4px;border-radius:16px;padding:14px;
    background:linear-gradient(135deg, var(--blue), var(--violet) 55%, var(--pink) 130%);
    color:#fff;overflow:hidden;animation:rise .45s ease;
    display:flex;align-items:flex-start;gap:12px;
  }
  .id-card::after{
    content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 100% 0%, rgba(255,255,255,.22), transparent 55%);
    pointer-events:none;
  }
  @keyframes rise{0%{transform:translateY(14px);opacity:0;}100%{transform:translateY(0);opacity:1;}}

  .id-card-info{flex:1;min-width:0;text-align:right;position:relative;z-index:1;}
  .id-card-logo-wrap{display:block;margin-bottom:10px;line-height:0;}
  .id-card-logo{height:34px;width:auto;display:inline-block;}
  .id-card-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:1px 0;}
  .id-card-label{font-size:.62rem;color:rgba(255,255,255,.62);font-weight:700;white-space:nowrap;}
  .id-card-value{font-family:'Baloo Bhaijaan 2', sans-serif;font-size:.85rem;font-weight:700;color:#fff;letter-spacing:.2px;overflow:hidden;text-overflow:ellipsis;}

  /* عنصر واحد فقط للصورة (بدل صورة + مكان فاضي منفصلين) لمنع ظهور الاثنين معًا بالغلط */
  .id-card-visual{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;position:relative;z-index:1;}
  .id-card-qr{background:#fff;border-radius:10px;padding:5px;line-height:0;display:inline-flex;width:88px;height:88px;align-items:center;justify-content:center;}
  .id-card-qr img, .id-card-qr canvas{display:block;width:100%;height:100%;border-radius:4px;}
  .id-card-photo-box{
    width:60px;height:60px;border-radius:10px;flex-shrink:0;
    background-size:cover;background-position:center;background-repeat:no-repeat;
    border:2px solid rgba(255,255,255,.55);background-color:rgba(255,255,255,.1);
    display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  }

  .qr-hint{text-align:center;font-size:.78rem;color:var(--text-muted);margin:8px 0 0;}
  .no-animate, .no-animate *{animation:none !important;}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <img class="logo app-logo" alt="هواية الصيفي">
    <div class="welcome-pill">أهلًا بك، يا مشرف هواية ✨</div>

    <div id="formView">
      <h1>تسجيل طالب جديد</h1>
      <p class="subtitle">سجّل بيانات الطالب وسلّمه بطاقته</p>
      <form id="registerForm">
        <label>اسم الطالب<input type="text" id="studentName" placeholder="اكتب الاسم الكامل" required></label>
        <label>
          المرحلة الدراسية
          <select id="studentStage" required>
            <option value="" disabled selected>اختر المرحلة</option>
            <optgroup label="ابتدائي">
              <option>الأول ابتدائي</option><option>الثاني ابتدائي</option>
              <option>الثالث ابتدائي</option><option>الرابع ابتدائي</option>
              <option>الخامس ابتدائي</option><option>السادس ابتدائي</option>
            </optgroup>
            <optgroup label="متوسط">
              <option>الأول متوسط</option><option>الثاني متوسط</option><option>الثالث متوسط</option>
            </optgroup>
            <optgroup label="ثانوي">
              <option>الأول ثانوي</option><option>الثاني ثانوي</option><option>الثالث ثانوي</option>
            </optgroup>
          </select>
        </label>
        <label>
          صورة الطالب (اختياري)
          <input type="file" id="studentImage" accept="image/*">
        </label>
        <div id="imagePreviewWrap" class="hidden">
          <img id="imagePreview" class="image-preview" alt="معاينة الصورة">
        </div>
        <button type="submit" id="submitBtn">تسجيل الطالب</button>
        <p class="error" id="errorMsg"></p>
      </form>
    </div>

    <div id="successView" class="hidden">
      <div class="sun-icon">☀️</div>
      <h1>تم تسجيل الطالب</h1>
      <p class="subtitle">باسم <span id="successName"></span></p>

      <div id="badgeCard" class="id-card">
        <div class="id-card-info">
          <div class="id-card-logo-wrap"><img class="id-card-logo app-logo" alt="هواية الصيفي"></div>
          <div class="id-card-row"><span class="id-card-value" id="cardName"></span><span class="id-card-label">الاسم</span></div>
          <div class="id-card-row"><span class="id-card-value" id="badgeId"></span><span class="id-card-label">ID</span></div>
          <div class="id-card-row"><span class="id-card-value" id="cardStage"></span><span class="id-card-label">الصف</span></div>
          <div class="id-card-row"><span class="id-card-value" id="badgePw"></span><span class="id-card-label">الرقم السري</span></div>
        </div>
        <div class="id-card-visual">
          <div id="photoBox" class="id-card-photo-box">🧒</div>
          <div class="id-card-qr" id="qrcode"></div>
        </div>
      </div>

      <p class="qr-hint">صوّر الباركود بكاميرا الجوال لتسجيل الدخول مباشرة</p>
      <p class="qr-hint" id="badgeStatus" style="display:none;">⏳ جاري حفظ نسخة البطاقة، لحظات...</p>
      <button id="downloadBtn" type="button">تحميل البطاقة</button>
      <button id="resetBtn" type="button" class="btn-secondary">تسجيل طالب آخر</button>
    </div>
</div>

<script>
  /* =========================================================================
     مهم جدًا قبل النشر:
     1) CLOUDINARY_CLOUD_NAME / CLOUDINARY_UPLOAD_PRESET -> من حساب Cloudinary
     2) APPS_SCRIPT_URL -> رابط /exec لتطبيق الويب بعد نشر Code.gs
     3) STUDENT_APP_BASE_URL -> رابط تطبيق الطالب الذي يفتحه الباركود
     ========================================================================= */
  const CLOUDINARY_CLOUD_NAME = 'dhv0ypi5d';
  const CLOUDINARY_UPLOAD_PRESET = 'hawaya_upload';
  const CLOUDINARY_UPLOAD_URL = 'https://api.cloudinary.com/v1_1/' + CLOUDINARY_CLOUD_NAME + '/image/upload';

  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzzwgm2Rap0kBTA0jzt2G3MgBIMWlqfmtE4QmRl6YwnbPHxY9YhH6c6wyMNh9WdXmNeTw/exec';
  const STUDENT_APP_BASE_URL = 'https://faresmaqbool94-code.github.io/REPLACE_WITH_APP_NAME/';

  // شعار هواية الصيفي (ملف خارجي مفرّغ الخلفية، بجانب index.html على GitHub)
  const LOGO_SRC = 'logo.png';
  document.querySelectorAll('.app-logo').forEach((img) => { img.src = LOGO_SRC; });

  const form = document.getElementById('registerForm');
  const submitBtn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');
  const formView = document.getElementById('formView');
  const successView = document.getElementById('successView');

  let compressedImageBase64 = null;
  let currentStudentId = null;
  let currentStudentName = null;
  let lastBadgePdfBlob = null;

  document.getElementById('studentImage').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    const wrap = document.getElementById('imagePreviewWrap');
    if (!file) { compressedImageBase64 = null; wrap.classList.add('hidden'); return; }
    try {
      compressedImageBase64 = await compressImage(file, 800, 0.7);
      document.getElementById('imagePreview').src = 'data:image/jpeg;base64,' + compressedImageBase64;
      wrap.classList.remove('hidden');
    } catch (err) {
      errorMsg.textContent = 'تعذر تحميل الصورة، يمكنك المتابعة بدونها';
      compressedImageBase64 = null; wrap.classList.add('hidden');
    }
  });

  function compressImage(file, maxDim, quality) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > height && width > maxDim) { height = Math.round(height * (maxDim / width)); width = maxDim; }
          else if (height >= width && height > maxDim) { width = Math.round(width * (maxDim / height)); height = maxDim; }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality).split(',')[1]);
        };
        img.onerror = reject;
        img.src = ev.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  /**
   * رفع مباشر إلى Cloudinary (من المتصفح، بدون Apps Script إطلاقًا)
   * نستخدم unsigned upload preset، فلا نحتاج API Key أو Secret هنا إطلاقًا
   * base64Data: نص base64 خام بدون "data:...;base64,"
   * folder: مجلد منطقي داخل Cloudinary (اختياري، للتنظيم فقط) مثل "student-photos"
   */
  async function uploadToCloudinary(base64Data, folder, mimeType) {
    const dataUrl = 'data:' + mimeType + ';base64,' + base64Data;
    const fd = new FormData();
    fd.append('file', dataUrl);
    fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
    fd.append('folder', folder);

    const res = await fetch(CLOUDINARY_UPLOAD_URL, { method: 'POST', body: fd });
    const json = await res.json();
    if (!res.ok || !json.secure_url) {
      throw new Error(json.error ? json.error.message : 'فشل الرفع إلى Cloudinary');
    }
    return json.secure_url;
  }

  /**
   * رفع ملف (Blob) مباشرة إلى Cloudinary — نستخدمها لرفع البطاقة كـ PDF.
   * Cloudinary يدعم PDF عبر endpoint الصور نفسه بدون أي تغيير إضافي.
   */
  async function uploadFileToCloudinary(blob, folder, filename) {
    const fd = new FormData();
    fd.append('file', blob, filename);
    fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
    fd.append('folder', folder);

    const res = await fetch(CLOUDINARY_UPLOAD_URL, { method: 'POST', body: fd });
    const json = await res.json();
    if (!res.ok || !json.secure_url) {
      throw new Error(json.error ? json.error.message : 'فشل الرفع إلى Cloudinary');
    }
    return json.secure_url;
  }

  /** يحوّل كانفاس البطاقة (الصورة المرسومة بـ html2canvas) إلى ملف PDF (Blob) */
  function canvasToPdfBlob(canvas) {
    const { jsPDF } = window.jspdf;
    const orientation = canvas.width >= canvas.height ? 'landscape' : 'portrait';
    const pdf = new jsPDF({ orientation: orientation, unit: 'px', format: [canvas.width, canvas.height] });
    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, canvas.width, canvas.height);
    return pdf.output('blob');
  }

  /** الاتصال بـ Apps Script يصير الآن فقط لكتابة البيانات في الشيت (نص + روابط جاهزة) */
  async function callAppsScript(payload) {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.textContent = '';
    const name = document.getElementById('studentName').value.trim();
    const stage = document.getElementById('studentStage').value;
    if (!name || !stage) { errorMsg.textContent = 'الاسم والمرحلة مطلوبان'; return; }

    submitBtn.disabled = true;
    submitBtn.textContent = 'جاري التسجيل...';

    try {
      let imageUrl = '';
      if (compressedImageBase64) {
        imageUrl = await uploadToCloudinary(compressedImageBase64, 'student-photos', 'image/jpeg');
      }

      const data = await callAppsScript({
        action: 'register',
        name: name,
        stage: stage,
        imageUrl: imageUrl
      });

      if (!data.success) {
        errorMsg.textContent = data.error || 'حدث خطأ، حاول مرة أخرى';
        submitBtn.disabled = false; submitBtn.textContent = 'تسجيل الطالب';
        return;
      }
      showSuccess(data); // لا await هنا عمدًا — التسجيل يكتمل فورًا، وحفظ البطاقة يجري بالخلفية
      submitBtn.disabled = false; submitBtn.textContent = 'تسجيل الطالب';
    } catch (err) {
      errorMsg.textContent = 'حدث خطأ في الاتصال: ' + err.message;
      submitBtn.disabled = false; submitBtn.textContent = 'تسجيل الطالب';
    }
  });

  /**
   * تحضّر صورة الطالب داخل عنصر واحد فقط (#photoBox) — بدون عنصرين متبادلين،
   * لتفادي ظهور الصورة والمكان الفاضي معًا بالغلط. تنتظر تحميل الصورة فعليًا
   * (بحد أقصى 4 ثواني) قبل أي تصوير للبطاقة.
   */
  function setPhotoBox(url) {
    const photoBox = document.getElementById('photoBox');
    return new Promise((resolve) => {
      if (!url) {
        photoBox.style.backgroundImage = '';
        photoBox.textContent = '🧒';
        resolve();
        return;
      }
      photoBox.textContent = '';
      const preloadImg = new Image();
      preloadImg.crossOrigin = 'anonymous'; // قبل src دائمًا، لتفادي تلويث الكانفاس وقت التصوير
      const timer = setTimeout(() => { photoBox.style.backgroundImage = "url('" + url + "')"; resolve(); }, 4000);
      preloadImg.onload = () => { clearTimeout(timer); photoBox.style.backgroundImage = "url('" + url + "')"; resolve(); };
      preloadImg.onerror = () => { clearTimeout(timer); photoBox.textContent = '🧒'; resolve(); };
      preloadImg.src = url;
    });
  }

  /**
   * التسجيل يظهر فورًا بدون انتظار. حفظ البطاقة (تصوير + رفع + كتابة الرابط
   * بالشيت) يجري بالخلفية في نفس اللحظة، ونحدّث "badgeStatus" لما يخلص —
   * بدون ما نوقف المستخدم أو نأخر زر التسجيل.
   */
  function showSuccess(data) {
    currentStudentId = data.id;
    currentStudentName = data.name;
    lastBadgePdfBlob = null;

    document.getElementById('successName').textContent = data.name;
    document.getElementById('cardName').textContent = data.name;
    document.getElementById('cardStage').textContent = data.stage || '';
    document.getElementById('badgeId').textContent = data.id;
    document.getElementById('badgePw').textContent = data.password;

    const qrContainer = document.getElementById('qrcode');
    qrContainer.innerHTML = '';
    const loginLink = STUDENT_APP_BASE_URL + '?id=' + data.id + '&pw=' + data.password;
    new QRCode(qrContainer, { text: loginLink, width: 160, height: 160, colorDark: '#15101F', colorLight: '#ffffff' });

    formView.classList.add('hidden');
    successView.classList.remove('hidden');

    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');
    const badgeStatus = document.getElementById('badgeStatus');
    badgeStatus.style.color = 'var(--text-muted)';
    badgeStatus.textContent = '⏳ جاري حفظ نسخة البطاقة بالخلفية...';
    badgeStatus.style.display = 'block';

    // كل ما يلي يجري بالخلفية فورًا، بدون انتظار من المستخدم ولا تأخير الـ UI
    setPhotoBox(data.imageUrl)
      .then(() => withTimeout(saveBadge(), 15000, 'انتهت المهلة (15 ثانية) — تحقق من الاتصال بالإنترنت'))
      .then((result) => {
        if (result.ok) {
          badgeStatus.style.display = 'none';
        } else {
          badgeStatus.style.color = 'var(--error)';
          badgeStatus.textContent = '⚠️ تعذر حفظ البطاقة: ' + result.error;
          badgeStatus.style.display = 'block';
        }
      })
      .catch((err) => {
        badgeStatus.style.color = 'var(--error)';
        badgeStatus.textContent = '⚠️ تعذر حفظ البطاقة: ' + (err && err.message ? err.message : err);
        badgeStatus.style.display = 'block';
      });
  }

  /** يحوّل أي Promise معلّق إلى خطأ صريح بعد مهلة معينة، بدل التعليق إلى الأبد */
  function withTimeout(promise, ms, timeoutMessage) {
    return new Promise((resolve, reject) => {
      const timer = setTimeout(() => reject(new Error(timeoutMessage)), ms);
      promise.then(
        (val) => { clearTimeout(timer); resolve(val); },
        (err) => { clearTimeout(timer); reject(err); }
      );
    });
  }

  async function renderBadgeCanvas() {
    const badgeCard = document.getElementById('badgeCard');
    badgeCard.classList.add('no-animate');
    // ملاحظة: استخدمنا setTimeout بدل requestAnimationFrame لأن rAF يتوقف كليًا
    // لو الصفحة صارت بالخلفية (قفل شاشة/تبديل تطبيق) على الجوال، فيعلّق العملية للأبد
    await new Promise((resolve) => setTimeout(resolve, 80));
    const canvas = await html2canvas(badgeCard, { backgroundColor: '#ffffff', scale: 2, useCORS: true });
    badgeCard.classList.remove('no-animate');
    return canvas;
  }

  /** نسوي البطاقة PDF، نرفعها لـ Cloudinary، ثم نخزن رابطها في الشيت عبر Apps Script
   *  ترجع { ok: true } أو { ok: false, error: '...' } بدل ما تخفي الخطأ في Console فقط
   */
  async function saveBadge() {
    try {
      const canvas = await renderBadgeCanvas();
      const pdfBlob = canvasToPdfBlob(canvas);
      lastBadgePdfBlob = pdfBlob;

      const badgeUrl = await uploadFileToCloudinary(pdfBlob, 'badges', (currentStudentId || 'badge') + '.pdf');

      const data = await callAppsScript({
        action: 'saveBadge',
        id: currentStudentId,
        badgeUrl: badgeUrl
      });

      if (!data.success) {
        return { ok: false, error: 'الشيت رفض الحفظ: ' + (data.error || 'غير معروف') };
      }
      return { ok: true };
    } catch (err) {
      return { ok: false, error: (err && err.message) ? err.message : String(err) };
    }
  }

  document.getElementById('downloadBtn').addEventListener('click', async () => {
    let blob = lastBadgePdfBlob;
    if (!blob) {
      const canvas = await renderBadgeCanvas();
      blob = canvasToPdfBlob(canvas);
    }
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'بطاقة_' + (currentStudentName || 'طالب') + '.pdf';
    link.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    form.reset();
    compressedImageBase64 = null; currentStudentId = null; currentStudentName = null; lastBadgePdfBlob = null;
    document.getElementById('imagePreviewWrap').classList.add('hidden');
    submitBtn.disabled = false; submitBtn.textContent = 'تسجيل الطالب';
    successView.classList.add('hidden');
    formView.classList.remove('hidden');
  });
</script>
</body>
</html>
