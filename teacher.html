<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رحلة هواية - شاشة المعلم</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="manifest" href="teacher-manifest.json">
<meta name="theme-color" content="#352868">
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@600;700;800&family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo:#352868; --text:#2B2640; --text-muted:#79738F; --bg:#F4F2FA; --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;background:var(--bg);font-family:'Almarai', sans-serif;color:var(--text);
    overflow-x:hidden;
  }

  .top-bar{display:flex;align-items:center;justify-content:space-between;padding:18px 36px;}
  .logo{height:64px;}
  .clock{font-family:'Baloo Bhaijaan 2', sans-serif;font-size:1.6rem;color:var(--indigo);font-weight:700;}

  .stage-tabs{display:flex;gap:12px;padding:0 36px 18px;flex-wrap:wrap;}
  .stage-tab{
    padding:14px 28px;border-radius:999px;border:none;background:#fff;color:var(--text-muted);
    font-family:'Almarai', sans-serif;font-weight:800;font-size:1.05rem;cursor:pointer;
    box-shadow:0 4px 0 0 #E3DEF0;
  }
  .stage-tab.active{background:var(--indigo);color:#fff;box-shadow:0 4px 0 0 #1F1738;}

  .actions-row{display:flex;gap:18px;padding:0 36px 26px;flex-wrap:wrap;}
  .action-btn{
    width:132px;height:132px;border-radius:30px;border:none;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    color:#fff;font-family:'Almarai', sans-serif;font-weight:800;font-size:1rem;text-align:center;
    transition:transform .1s ease;position:relative;padding:8px;
  }
  .action-btn:active{transform:translateY(5px);}
  .action-btn .pts{font-family:'Baloo Bhaijaan 2', sans-serif;font-size:.85rem;opacity:.92;}
  .action-btn.active-now{outline:6px solid #fff;outline-offset:-12px;}
  .action-btn.active-now::after{
    content:'●';position:absolute;top:10px;left:14px;font-size:1.4rem;color:#fff;
  }

  .section-label{padding:0 36px;font-family:'Baloo Bhaijaan 2', sans-serif;font-size:1.2rem;color:var(--indigo);margin-bottom:10px;}

  .leaderboard-panel{
    flex:0 0 280px;background:#fff;border-radius:24px;padding:16px;
    max-height:calc(100vh - 320px);overflow:hidden;
  }
  .leaderboard-title{font-family:'Baloo Bhaijaan 2', sans-serif;font-size:1.05rem;color:var(--indigo);margin-bottom:10px;text-align:center;}
  .hero-row{display:flex;align-items:center;gap:10px;padding:8px 6px;border-radius:14px;}
  .hero-row + .hero-row{margin-top:4px;}
  .hero-rank-num{
    flex-shrink:0;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Baloo Bhaijaan 2', sans-serif;font-weight:700;font-size:.95rem;color:#5A4300;
    background:linear-gradient(180deg,#FFD976,#E8A720);
  }
  .hero-rank-num.r2{background:linear-gradient(180deg,#E3E1ED,#B9B6CC);color:#352868;}
  .hero-rank-num.r3{background:linear-gradient(180deg,#E8C9A0,#C99A5F);color:#4A2F0C;}
  .hero-rank-num.rest{background:#F3F0FA;color:var(--indigo);}
  .hero-row-photo{
    flex-shrink:0;width:34px;height:34px;border-radius:10px;background-size:cover;background-position:center;
    background-color:#EFEAF8;display:flex;align-items:center;justify-content:center;font-size:1rem;
  }
  .hero-row-name{font-size:.92rem;font-weight:800;color:var(--indigo);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .students-panel{flex:1;min-width:0;background:#fff;border-radius:24px;padding:10px;max-height:calc(100vh - 320px);overflow-y:auto;}
  .student-row{
    display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:16px;cursor:pointer;
    transition:background .1s ease;
  }
  .student-row:active{transform:scale(.995);}
  .student-row.absent{opacity:.4;cursor:not-allowed;}
  .student-row-photo{
    flex-shrink:0;width:54px;height:54px;border-radius:14px;background-size:cover;background-position:center;
    background-color:#F3F0FA;display:flex;align-items:center;justify-content:center;font-size:1.4rem;
  }
  .student-row-name{flex:1;min-width:0;font-size:1.08rem;font-weight:800;color:var(--indigo);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .student-row-rank{font-size:.8rem;font-weight:700;color:var(--text-muted);margin-right:8px;}
  .status-pill{
    flex-shrink:0;font-size:.82rem;font-weight:800;padding:6px 14px;border-radius:999px;
  }
  .status-pill.present{background:#EAF7EF;color:#27500A;}
  .status-pill.absent-pill{background:#F1EFE8;color:#5F5E5A;}
  .check-circle{
    flex-shrink:0;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:1.2rem;font-weight:800;background:#E7E2F2;
  }
  .student-row.selected .check-circle{background:var(--sel-color, #2E9E6C);}
  .student-row.selected{background:#FBFAFD;}

  .select-all-row{
    display:none;align-items:center;gap:10px;padding:12px 16px;margin-bottom:8px;
    border-radius:14px;background:#F3F0FA;cursor:pointer;font-weight:800;color:var(--indigo);
  }
  .select-all-row.show{display:flex;}
  .select-all-row input{width:26px;height:26px;flex-shrink:0;accent-color:var(--indigo);}

  .confirm-bar{
    position:sticky;bottom:0;background:#fff;box-shadow:0 -8px 24px -12px rgba(53,40,104,.2);
    padding:18px 36px;display:flex;align-items:center;justify-content:space-between;gap:18px;
  }
  .confirm-count{font-family:'Baloo Bhaijaan 2', sans-serif;font-size:1.2rem;color:var(--indigo);}
  .confirm-btn{
    flex-shrink:0;padding:18px 48px;border-radius:999px;border:none;cursor:pointer;
    background:linear-gradient(180deg,#3FAE7E,#2E9E6C);color:#fff;
    font-family:'Baloo Bhaijaan 2', sans-serif;font-weight:700;font-size:1.2rem;
    box-shadow:0 6px 0 0 #1F6B4A;
  }
  .confirm-btn:disabled{background:#D3D1C7;box-shadow:0 6px 0 0 #B4B2A9;cursor:not-allowed;}
  .confirm-btn:active:not(:disabled){transform:translateY(4px);}

  .empty-hint{padding:30px 36px;color:var(--text-muted);font-size:1.05rem;}
</style>
</head>
<body>

<div class="top-bar">
  <img class="logo" id="headerLogo" alt="هواية">
  <div class="clock" id="clockDisplay"></div>
</div>

<div class="stage-tabs" id="stageTabs">
  <button type="button" class="stage-tab active" data-stages="أول ابتدائي">أول ابتدائي</button>
  <button type="button" class="stage-tab" data-stages="ثاني وثالث">ثاني وثالث ابتدائي</button>
  <button type="button" class="stage-tab" data-stages="رابع ابتدائي">رابع ابتدائي</button>
</div>

<div class="actions-row" id="actionsRow"></div>

<div class="section-label" id="sectionLabel">اختر إنجازًا أو "حاضر" من الأعلى لبدء التحديد</div>

<div style="display:flex;gap:18px;padding:0 36px 26px;align-items:flex-start;">
  <div class="students-panel" id="studentsPanel">
    <label class="select-all-row" id="selectAllRow">
      <input type="checkbox" id="selectAllCheckbox">
      <span>الكل ✓</span>
    </label>
    <div class="students-list" id="studentsGrid"></div>
  </div>
  <div class="leaderboard-panel">
    <div class="leaderboard-title">⭐ الخمسة الأبطال</div>
    <div id="leaderboardStrip"></div>
    <button type="button" id="leaderboardRefreshBtn" class="stage-tab" style="width:100%;margin-top:10px;">🔄 تحديث</button>
  </div>
</div>

<div class="confirm-bar">
  <span class="confirm-count" id="confirmCount"></span>
  <button type="button" class="confirm-btn" id="confirmBtn" disabled>تأكيد التحديد</button>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzVV1SDLMhie0fMAf2qfu-1wB5AmSvRl3u-T7JDm2wUzaut6I8Lo3NTMpd9P9wE706blA/exec';
  const LOGO_SRC = 'logo.png';
  document.getElementById('headerLogo').src = LOGO_SRC;

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('teacher-sw.js').catch(() => {});
    });
  }

  const ALL_STAGES = ['أول ابتدائي', 'ثاني ابتدائي', 'ثالث ابتدائي', 'رابع ابتدائي'];

  const ACTION_COLORS = {
    'حاضر': { top: '#6FD9A8', bottom: '#2E9E6C', shadow: '#1F6B4A' },
    'حلقة': { top: '#A993CC', bottom: '#7C5BA6', shadow: '#56407A' },
    'لعب_نظيف': { top: '#6FA3E0', bottom: '#2F6FBF', shadow: '#1E4F8A' },
    'ابداع': { top: '#F8AFC9', bottom: '#F178A8', shadow: '#B3527B' },
    'كرم': { top: '#FFD466', bottom: '#E8A720', shadow: '#A87814' },
    'اذان_وكلمة': { top: '#6FD6CC', bottom: '#2BA8A0', shadow: '#1C7972' },
    'مهاري': { top: '#F4AD7C', bottom: '#E07A3F', shadow: '#A2562B' },
    'تعليمي': { top: '#82BBEF', bottom: '#3D8FD6', shadow: '#2A6499' },
    'قيمي': { top: '#C2A3E8', bottom: '#9466C4', shadow: '#684790' },
    'تنافسي': { top: '#F09999', bottom: '#D85C5C', shadow: '#9B3F3F' }
  };

  let dashboardData = null;
  let activeKey = null;
  let selectedIds = new Set();
  let currentStages = ['أول ابتدائي'];

  function updateClock() {
    document.getElementById('clockDisplay').textContent = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 30000);

  async function callAppsScript(payload) {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  function renderLeaderboard(top5) {
    const wrap = document.getElementById('leaderboardStrip');
    if (!top5 || !top5.length) { wrap.innerHTML = '<p style="text-align:center;color:var(--text-muted);font-size:.9rem;">لا توجد بيانات كافية بعد</p>'; return; }
    wrap.innerHTML = top5.map((s) => {
      const rankClass = s.rank === 1 ? '' : s.rank === 2 ? 'r2' : s.rank === 3 ? 'r3' : 'rest';
      return `
      <div class="hero-row">
        <div class="hero-rank-num ${rankClass}">${s.rank}</div>
        <div class="hero-row-photo" style="${s.imageUrl ? `background-image:url('${s.imageUrl}')` : ''}">${s.imageUrl ? '' : '🧒'}</div>
        <div class="hero-row-name">${s.name}</div>
      </div>`;
    }).join('');
  }

  function renderActionButtons() {
    const wrap = document.getElementById('actionsRow');
    const items = [{ key: 'حاضر', label: 'حاضر', points: null }]
      .concat(dashboardData.dailyAchievements.map((a) => ({ key: a.key, label: a.label, points: a.points })))
      .concat(dashboardData.weeklyAchievements.map((a) => ({ key: a.key, label: a.label, points: a.points })));

    wrap.innerHTML = items.map((item) => {
      const c = ACTION_COLORS[item.key] || ACTION_COLORS['حلقة'];
      const isActive = activeKey === item.key;
      return `<button type="button" class="action-btn ${isActive ? 'active-now' : ''}" data-key="${item.key}"
        style="background:linear-gradient(180deg, ${c.top}, ${c.bottom});box-shadow:0 8px 0 0 ${c.shadow}, 0 14px 22px -10px rgba(0,0,0,.3);">
        <span>${item.label}</span>
        ${item.points ? `<span class="pts">+${item.points} دينار</span>` : ''}
      </button>`;
    }).join('');

    wrap.querySelectorAll('.action-btn').forEach((btn) => {
      btn.addEventListener('click', () => activateKey(btn.dataset.key));
    });
  }

  function activateKey(key) {
    activeKey = key;
    selectedIds = new Set();
    renderActionButtons();
    renderStudents();
    updateConfirmBar();
    const label = key === 'حاضر' ? 'حاضر' :
      (dashboardData.dailyAchievements.concat(dashboardData.weeklyAchievements).find((a) => a.key === key) || {}).label;
    document.getElementById('sectionLabel').textContent = 'حدد الطلاب لـ "' + label + '" ثم اضغط تأكيد بالأسفل';
  }

  function isDoneToday(studentId) {
    if (activeKey === 'حاضر') {
      const s = dashboardData.students.find((x) => x.id === studentId);
      return s ? s.present : false;
    }
    const map = dashboardData.achievementDoneMap[activeKey] || {};
    return !!map[studentId];
  }

  function renderStudents() {
    const grid = document.getElementById('studentsGrid');
    const list = dashboardData.students.filter((s) => currentStages.indexOf(s.stage) !== -1);
    const selectAllRow = document.getElementById('selectAllRow');

    if (!list.length) {
      grid.innerHTML = '<p class="empty-hint">لا يوجد طلاب بهذي المرحلة</p>';
      selectAllRow.classList.remove('show');
      return;
    }

    // صف "تحديد الكل" يظهر فقط لما يكون فيه إنجاز/حاضر مفعّل حاليًا
    selectAllRow.classList.toggle('show', !!activeKey);

    const colorInfo = ACTION_COLORS[activeKey] || ACTION_COLORS['حلقة'];
    let tappableCount = 0, tappableSelectedCount = 0;

    grid.innerHTML = list.map((s) => {
      const done = activeKey ? isDoneToday(s.id) : false;
      const canTap = activeKey && (activeKey === 'حاضر' || s.present) && !done;
      const isPending = selectedIds.has(s.id) && !done; // محدد الآن، لسا ما تأكد
      const rowClasses = ['student-row'];
      if (activeKey && activeKey !== 'حاضر' && !s.present) rowClasses.push('absent');
      if (done || isPending) rowClasses.push('selected'); // تلوين الدائرة بالحالتين

      if (canTap) {
        tappableCount++;
        if (isPending) tappableSelectedCount++;
      }

      const statusPill = activeKey !== 'حاضر'
        ? (s.present ? '<span class="status-pill present">حاضر</span>' : '<span class="status-pill absent-pill">غائب</span>')
        : '';

      return `<div class="${rowClasses.join(' ')}" data-id="${s.id}" data-tappable="${canTap ? '1' : '0'}" style="--sel-color:${colorInfo.bottom};">
        <div class="student-row-photo" style="${s.imageUrl ? `background-image:url('${s.imageUrl}')` : ''}">${s.imageUrl ? '' : '🧒'}</div>
        <div class="student-row-name">${s.name}<span class="student-row-rank">#${s.rank}</span></div>
        ${statusPill}
        <div class="check-circle">${done ? '✓' : ''}</div>
      </div>`;
    }).join('');

    // مزامنة مربع "تحديد الكل": محدد فقط لو كل الطلاب القابلين للتحديد محددين بالفعل
    const selectAllCheckbox = document.getElementById('selectAllCheckbox');
    selectAllCheckbox.checked = tappableCount > 0 && tappableCount === tappableSelectedCount;

    grid.querySelectorAll('[data-tappable="1"]').forEach((row) => {
      row.addEventListener('click', () => {
        const id = row.dataset.id;
        if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
        renderStudents();
        updateConfirmBar();
      });
    });
  }

  function updateConfirmBar() {
    const count = selectedIds.size;
    document.getElementById('confirmCount').textContent = count ? (count + ' طالب محدد') : '';
    document.getElementById('confirmBtn').disabled = count === 0;
  }

  document.getElementById('selectAllCheckbox').addEventListener('change', (e) => {
    const list = dashboardData.students.filter((s) => currentStages.indexOf(s.stage) !== -1);
    list.forEach((s) => {
      const done = activeKey ? isDoneToday(s.id) : false;
      const canTap = activeKey && (activeKey === 'حاضر' || s.present) && !done;
      if (!canTap) return; // الغائبين والمؤكدين من قبل لا يتأثرون بتحديد الكل
      if (e.target.checked) selectedIds.add(s.id); else selectedIds.delete(s.id);
    });
    renderStudents();
    updateConfirmBar();
  });

  document.getElementById('confirmBtn').addEventListener('click', async () => {
    if (!selectedIds.size || !activeKey) return;
    const btn = document.getElementById('confirmBtn');
    btn.disabled = true;
    btn.textContent = 'جاري الحفظ...';
    let failMsg = null;

    try {
      const ids = Array.from(selectedIds);
      let result;
      if (activeKey === 'حاضر') {
        result = await callAppsScript({ action: 'bulkMarkAttendance', ids: ids, supervisorName: 'المعلم', source: 'teacher' });
      } else {
        result = await callAppsScript({ action: 'teacherMarkAchievement', achievementKey: activeKey, studentIds: ids });
      }

      if (result.success) {
        await loadDashboard();
        selectedIds = new Set(); // التصفير فقط عند النجاح المؤكد من الخادم
        renderActionButtons();
        renderStudents();
        updateConfirmBar();
        btn.textContent = '✅ تم الحفظ';
        setTimeout(() => { btn.textContent = 'تأكيد التحديد'; }, 1800);
      } else {
        failMsg = result.error || 'تعذر الحفظ';
      }
    } catch (_) {
      failMsg = 'فشل الاتصال';
    }

    // عند الفشل: التحديد يبقى كما هو بدون أي تغيير، فقط نعرض السبب لحظيًا
    // ثم نرجع الزر قابل للضغط مرة ثانية بنفس التحديد الحالي للمحاولة من جديد
    if (failMsg) {
      btn.textContent = failMsg;
      setTimeout(() => {
        btn.disabled = selectedIds.size === 0;
        btn.textContent = 'تأكيد التحديد';
      }, 2000);
    }
  });

  document.querySelectorAll('.stage-tab').forEach((tab) => {
    tab.addEventListener('click', async () => {
      document.querySelectorAll('.stage-tab').forEach((t) => t.classList.remove('active'));
      tab.classList.add('active');
      const key = tab.dataset.stages;
      if (key === 'ثاني وثالث') currentStages = ['ثاني ابتدائي', 'ثالث ابتدائي'];
      else currentStages = [key];
      await refreshAll();
    });
  });

  document.getElementById('leaderboardRefreshBtn').addEventListener('click', refreshAll);

  async function loadDashboard() {
    try {
      const data = await callAppsScript({ action: 'getTeacherDashboardData', stages: currentStages });
      if (data.success) dashboardData = data;
    } catch (_) {
      // تجاهل بصمت — تبقى آخر بيانات محمّلة بنجاح ظاهرة، ويعاد المحاولة
      // تلقائيًا بالتحديث الدوري التالي (كل دقيقة) بدون مقاطعة الشاشة
    }
  }

  // يعيد تحميل وعرض كل شي بنفس المرحلة المحددة حاليًا — تستخدمها كل من
  // تبديل التبويب وزر التحديث اليدوي
  async function refreshAll() {
    selectedIds = new Set();
    updateConfirmBar();
    await loadDashboard();
    if (!dashboardData) {
      document.getElementById('studentsGrid').innerHTML = '<p class="empty-hint">تعذر الاتصال بالخادم، تحقق من الإنترنت — ستتم إعادة المحاولة تلقائيًا</p>';
      return;
    }
    renderLeaderboard(dashboardData.top10);
    renderActionButtons();
    renderStudents();
  }

  async function init() {
    await refreshAll();
  }

  init();
  setInterval(refreshAll, 60000);
</script>
</body>
</html>
